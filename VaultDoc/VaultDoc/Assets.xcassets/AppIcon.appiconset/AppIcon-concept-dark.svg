<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <defs>
    <!-- Dark navy background gradient -->
    <linearGradient id="bg" x1="0" y1="0" x2="1024" y2="1024" gradientUnits="userSpaceOnUse">
      <stop offset="0%"   stop-color="#0A1222"/>
      <stop offset="55%"  stop-color="#0D1830"/>
      <stop offset="100%" stop-color="#172150"/>
    </linearGradient>

    <!-- Brand blue → teal (diagonal, absolute coords) -->
    <linearGradient id="brand" x1="0" y1="0" x2="1024" y2="1024" gradientUnits="userSpaceOnUse">
      <stop offset="0%"   stop-color="#63A6FA"/>
      <stop offset="50%"  stop-color="#1C4FD8"/>
      <stop offset="100%" stop-color="#14B8A6"/>
    </linearGradient>

    <!-- Shield fill: brighter blue → teal, matches shield region -->
    <linearGradient id="shieldFill" x1="540" y1="495" x2="770" y2="790" gradientUnits="userSpaceOnUse">
      <stop offset="0%"   stop-color="#63A6FA"/>
      <stop offset="100%" stop-color="#14B8A6"/>
    </linearGradient>

    <!-- Document fill gradient (dark blue wash) -->
    <linearGradient id="docFill" x1="270" y1="185" x2="680" y2="720" gradientUnits="userSpaceOnUse">
      <stop offset="0%"   stop-color="#1C4FD8" stop-opacity="0.14"/>
      <stop offset="100%" stop-color="#14B8A6" stop-opacity="0.06"/>
    </linearGradient>

    <!-- Ambient glow: blue, top-left -->
    <radialGradient id="glow1" cx="30%" cy="28%" r="42%">
      <stop offset="0%"   stop-color="#1C4FD8" stop-opacity="0.30"/>
      <stop offset="100%" stop-color="#1C4FD8" stop-opacity="0"/>
    </radialGradient>

    <!-- Ambient glow: teal, bottom-right -->
    <radialGradient id="glow2" cx="72%" cy="74%" r="38%">
      <stop offset="0%"   stop-color="#14B8A6" stop-opacity="0.22"/>
      <stop offset="100%" stop-color="#14B8A6" stop-opacity="0"/>
    </radialGradient>

    <!-- Drop shadow for shield -->
    <filter id="shieldShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="10" stdDeviation="22" flood-color="#000814" flood-opacity="0.55"/>
    </filter>

    <!-- Soft glow for document -->
    <filter id="docGlow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="4" stdDeviation="14" flood-color="#1C4FD8" flood-opacity="0.25"/>
    </filter>

    <!-- iOS squircle clip -->
    <clipPath id="ios">
      <rect width="1024" height="1024" rx="220" ry="220"/>
    </clipPath>
  </defs>

  <!-- ─── Background ─── -->
  <rect width="1024" height="1024" rx="220" fill="url(#bg)"/>
  <rect width="1024" height="1024" rx="220" fill="url(#glow1)"/>
  <rect width="1024" height="1024" rx="220" fill="url(#glow2)"/>

  <!-- ─── Document (glass card with dog-eared corner) ─── -->
  <!-- Bounding box: left=270 top=185 right=672 bottom=718, fold=88 at top-right -->
  <g filter="url(#docGlow)">
    <path d="M 270,185
             L 584,185
             L 672,273
             L 672,718
             L 270,718
             Z"
          fill="url(#docFill)"
          stroke="url(#brand)" stroke-width="5" stroke-opacity="0.80"/>
  </g>

  <!-- Dog-ear fold lines -->
  <path d="M 584,185 L 584,273 L 672,273"
        fill="none"
        stroke="url(#brand)" stroke-width="5" opacity="0.45"/>

  <!-- Dog-ear inner triangle fill -->
  <path d="M 584,185 L 584,273 L 672,273 Z"
        fill="url(#brand)" fill-opacity="0.18"/>

  <!-- ─── Document content lines ─── -->
  <!-- Line 1 — longest, top -->
  <line x1="326" y1="360" x2="612" y2="360"
        stroke="url(#brand)" stroke-width="17" stroke-linecap="round" opacity="0.50"/>
  <!-- Line 2 -->
  <line x1="326" y1="415" x2="590" y2="415"
        stroke="url(#brand)" stroke-width="15" stroke-linecap="round" opacity="0.36"/>
  <!-- Line 3 -->
  <line x1="326" y1="467" x2="566" y2="467"
        stroke="url(#brand)" stroke-width="15" stroke-linecap="round" opacity="0.36"/>
  <!-- Line 4 — short, fades to imply more content -->
  <line x1="326" y1="519" x2="490" y2="519"
        stroke="url(#brand)" stroke-width="15" stroke-linecap="round" opacity="0.22"/>

  <!-- ─── Shield badge (lower-right, overlapping document) ─── -->
  <!-- Shield outer: left=540 right=770 top=495 tip≈790 -->
  <path d="M 555,512
           Q 555,495 572,495
           L 753,495
           Q 770,495 770,512
           L 770,622
           Q 770,722 660,785
           Q 550,722 550,622
           Z"
        fill="url(#shieldFill)"
        filter="url(#shieldShadow)"/>

  <!-- Shield inner highlight ring -->
  <path d="M 568,518
           Q 568,508 578,508
           L 742,508
           Q 752,508 752,518
           L 752,620
           Q 752,710 660,768
           Q 568,710 568,620
           Z"
        fill="none"
        stroke="white" stroke-width="1.5" opacity="0.30"/>

  <!-- ─── Lock icon inside shield ─── -->
  <!-- Lock body: rounded rect -->
  <rect x="622" y="632" width="76" height="72" rx="13"
        fill="white" opacity="0.95"/>

  <!-- Lock shackle (arch) -->
  <path d="M 639,632
           L 639,603
           Q 639,581 660,581
           Q 681,581 681,603
           L 681,632"
        fill="none"
        stroke="white" stroke-width="14" stroke-linecap="round" opacity="0.95"/>

  <!-- Keyhole circle -->
  <circle cx="660" cy="660" r="10"
          fill="url(#shieldFill)" opacity="0.90"/>

  <!-- Keyhole slot -->
  <rect x="656" y="660" width="8" height="17" rx="4"
        fill="url(#shieldFill)" opacity="0.90"/>

</svg>
